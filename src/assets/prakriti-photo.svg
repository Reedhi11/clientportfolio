<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F5AF0" />
      <stop offset="50%" stop-color="#FF4D8D" />
      <stop offset="100%" stop-color="#FF9F43" />
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="100%" stop-color="#3a2a4d" />
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9c0" />
      <stop offset="100%" stop-color="#ffb892" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFF9F5" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#FFF9F5" stop-opacity="0" />
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.2" /></filter>
  </defs>

  <!-- gradient backdrop -->
  <rect width="400" height="500" fill="url(#bg)" />
  <rect width="400" height="500" fill="url(#glow)" />

  <!-- abstract circles -->
  <circle cx="60" cy="80" r="44" fill="#FFF9F5" opacity="0.18" />
  <circle cx="350" cy="430" r="60" fill="#FFF9F5" opacity="0.16" />
  <circle cx="330" cy="90" r="22" fill="#FFF9F5" opacity="0.22" />

  <!-- hair back -->
  <path d="M90 230 C 70 140, 150 50, 210 60 C 290 70, 330 150, 322 240 C 322 280, 318 320, 305 360 L 95 360 C 82 320, 80 280, 90 230 Z" fill="url(#hair)" />

  <!-- shoulders -->
  <path d="M60 500 C 60 410, 130 380, 200 380 C 270 380, 340 410, 340 500 Z" fill="#1E1E1E" opacity="0.9" />
  <path d="M90 500 C 100 440, 150 420, 200 420 C 250 420, 300 440, 310 500 Z" fill="#FFF9F5" opacity="0.12" />

  <!-- neck -->
  <rect x="178" y="290" width="44" height="80" rx="14" fill="url(#skin)" />

  <!-- face -->
  <ellipse cx="200" cy="220" rx="78" ry="92" fill="url(#skin)" filter="url(#soft)" />

  <!-- hair front strands -->
  <path d="M122 200 C 120 160, 170 110, 220 116 C 260 120, 296 150, 296 200 C 280 168, 240 154, 210 158 C 178 162, 150 180, 122 200 Z" fill="url(#hair)" />
  <path d="M122 200 C 116 230, 118 260, 130 285 C 124 250, 126 220, 138 200 Z" fill="url(#hair)" />

  <!-- subtle cheek blush -->
  <ellipse cx="160" cy="245" rx="14" ry="8" fill="#FF4D8D" opacity="0.25" />
  <ellipse cx="240" cy="245" rx="14" ry="8" fill="#FF4D8D" opacity="0.25" />

  <!-- eyes -->
  <ellipse cx="170" cy="220" rx="5.5" ry="6.5" fill="#1E1E1E" />
  <ellipse cx="230" cy="220" rx="5.5" ry="6.5" fill="#1E1E1E" />
  <circle cx="171.5" cy="218" r="1.5" fill="#FFF9F5" />
  <circle cx="231.5" cy="218" r="1.5" fill="#FFF9F5" />

  <!-- brows -->
  <path d="M158 206 Q 170 200 184 206" stroke="#1E1E1E" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M216 206 Q 230 200 242 206" stroke="#1E1E1E" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- nose hint -->
  <path d="M200 230 Q 196 250 200 262 Q 206 264 210 260" stroke="#a86a52" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.55" />

  <!-- smile -->
  <path d="M182 275 Q 200 288 220 275" stroke="#1E1E1E" stroke-width="2.6" fill="none" stroke-linecap="round" />
  <path d="M186 278 Q 200 282 214 278" fill="#FF4D8D" opacity="0.5" />

  <!-- earrings -->
  <circle cx="125" cy="245" r="3" fill="#FF9F43" />
  <circle cx="275" cy="245" r="3" fill="#FF9F43" />

  <!-- sparkles -->
  <g fill="#FFF9F5">
    <path d="M80 380 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" />
    <path d="M330 320 l2.5 5 5 2.5 -5 2.5 -2.5 5 -2.5 -5 -5 -2.5 5 -2.5 z" opacity="0.85" />
    <path d="M70 160 l2 4 4 2 -4 2 -2 4 -2 -4 -4 -2 4 -2 z" opacity="0.7" />
  </g>

  <!-- placeholder label -->
  <g opacity="0.55">
    <rect x="116" y="450" width="168" height="28" rx="14" fill="#FFF9F5" />
    <text x="200" y="468" font-family="Space Grotesk, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E1E1E" text-anchor="middle" letter-spacing="2">REPLACE WITH PHOTO</text>
  </g>
</svg>
